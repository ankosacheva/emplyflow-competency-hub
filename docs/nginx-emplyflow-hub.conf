# nginx: emplyflow.ru + Hub at /hub/
# Path on VPS: /etc/nginx/sites-available/emplyflow.ru (example)
# Deploy static: rsync dist/hub/ → /var/www/emplyflow.ru/hub/

# --- HTTP → HTTPS + HSTS ---
server {
    listen 80;
    listen [::]:80;
    server_name emplyflow.ru www.emplyflow.ru;
    return 301 https://emplyflow.ru$request_uri;
}

# --- Legacy Hub subdomain (enable after migration QA) ---
# server {
