#     server_name hub.emplyflow.ru;
#     ssl_certificate     /etc/letsencrypt/live/hub.emplyflow.ru/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/hub.emplyflow.ru/privkey.pem;
#     return 301 https://emplyflow.ru/hub$request_uri;
# }

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name emplyflow.ru www.emplyflow.ru;

    ssl_certificate     /etc/letsencrypt/live/emplyflow.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emplyflow.ru/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tilda export or static main site
    root /var/www/emplyflow.ru;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;
    # brotli on; brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # www → apex
    if ($host = www.emplyflow.ru) {
        return 301 https://emplyflow.ru$request_uri;
    }

    # --- Hub static (prerender + SPA) ---
    location ^~ /hub/ {
        alias /var/www/emplyflow.ru/hub/;
        try_files $uri $uri/ /hub/index.html;

        # Single-filter prerender: ?role=head → cases/_pf/role/head/index.html
        location = /hub/cases {
            alias /var/www/emplyflow.ru/hub/cases/index.html;
            # Use map (below) + rewrite in production; example for role=head:
            # if ($args ~ "^role=([^&]+)$") { rewrite ^ /hub/cases/_pf/role/$1/index.html last; }
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|webp|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(html|xml|txt|webmanifest)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            add_header X-Robots-Tag "index, follow" always;
        }

        location = /hub/SEO_SETUP_REPORT.md {
            add_header X-Robots-Tag "noindex, nofollow" always;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

